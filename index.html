<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realistic 3D Earth - 8K Resolution</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <!-- WebGL Canvas Container -->
  <div id="canvas-container"></div>

  <!-- Sleek Top Progress Bar Loader -->
  <div id="loader-container" class="loader-container-top">
    <div id="loader-bar" class="loader-bar-fill"></div>
    <div class="loader-text">
      <span id="loader-status">Streaming 8K Satellite Data...</span>
      <span id="loader-percent">0%</span>
    </div>
  </div>

  <!-- Minimalist Corner Settings Widget -->
  <div class="minimal-controls-container">
    <button id="btn-settings-toggle" class="btn-toggle-hud" title="Toggle Controls">
      <span class="icon-gear">⚙</span>
    </button>
    
    <div id="settings-card" class="settings-card collapsed">
      <div class="settings-header">
        <h3>SYSTEM SETTINGS</h3>
        <span id="resolution-badge" class="badge badge-low-res">2K ACTIVE</span>
      </div>

      <div class="control-group">
        <label>ROTATION</label>
        <button id="btn-rotate" class="btn btn-toggle active">Auto-Rotate</button>
        <div class="slider-container">
          <span class="slider-label">Speed</span>
          <input type="range" id="slider-speed" min="0" max="100" value="15">
          <span id="speed-val" class="slider-value">0.15x</span>
        </div>
      </div>

      <div class="control-group">
        <label>SUN ANGLE (TIME OF DAY)</label>
        <div class="slider-container">
          <input type="range" id="slider-sun" min="0" max="360" value="45">
          <span id="sun-val" class="slider-value">45°</span>
        </div>
      </div>

      <div class="control-group">
        <label>LAYERS</label>
        <div class="layer-toggle-list">
          <button id="btn-layer-clouds" class="btn btn-layer active">Clouds</button>
          <button id="btn-layer-night" class="btn btn-layer active">Night Lights</button>
          <button id="btn-layer-bump" class="btn btn-layer active">Terrain Details</button>
        </div>
      </div>

      <button id="btn-reset" class="btn btn-action">Reset Viewport</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
